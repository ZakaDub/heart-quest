<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Всяки воспоминашки - 2 сайть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="pairs">
  <main class="puzzle-page">
    <h1 class="page-title">Воспоминашке</h1>
    <p class="hint-text">Соедини пары: этьни на две карточки или перетащи одну на другую</p>

    <div id="pairs-progress" class="pairs-progress">Собрано пор: 0 / 5</div>

    <div class="music-control">
      <button id="btn-music" class="btn-music" type="button">🎵 Музыка</button>
    </div>

    <footer class="puzzle-footer">
      <button id="btn-next" class="btn-next" type="button">Дальши →</button>
    </footer>
  </main>

  <script src="config.js?v=5"></script>
  <script src="script.js?v=12"></script>

</html>
